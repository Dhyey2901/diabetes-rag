<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Care RAG Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        textarea { width: 100%; height: 100px; }
        .answer-box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Diabetes Care RAG Assistant</h1>
    <form method="POST">
        <textarea name="question" placeholder="Enter your clinical question here"></textarea><br><br>
        <button type="submit">Ask</button>
    </form>

    {% if error %}
        <p style="color:red;">Error: {{ error }}</p>
    {% endif %}

    {% if answer %}
        <div class="answer-box">
            <h3>Answer:</h3>
            <p>{{ answer }}</p>
            <h4>Sources:</h4>
            <ul>
                {% for s in sources %}
                    <li><strong>{{ s.title }}</strong>: {{ s.snippet[:200] }}...</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
</body>
</html>
